name: Source URL health

on:
  workflow_dispatch:
    inputs:
      fail-on-unreachable:
        description: Fail the workflow when any source URL is unreachable.
        required: false
        default: false
        type: boolean
  schedule:
    # Advisory only. Keep this low-frequency so public dataset hosts are not
    # contacted by routine package checks.
    - cron: "23 10 3 * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  source-url-health:
    name: Check source URL reachability
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FAIL_ON_UNREACHABLE: ${{ inputs.fail-on-unreachable || 'false' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Validate source URL manifest
        run: |
          Rscript .github/scripts/validate-source-url-manifest.R \
            --manifest .github/source-urls.tsv \
            --source-dir R

      - name: Check source URLs
        run: |
          if [ "${FAIL_ON_UNREACHABLE}" = "true" ]; then
            Rscript .github/scripts/check-source-urls.R \
              --manifest .github/source-urls.tsv \
              --timeout 10 \
              --strict
          else
            Rscript .github/scripts/check-source-urls.R \
              --manifest .github/source-urls.tsv \
              --timeout 10
          fi
